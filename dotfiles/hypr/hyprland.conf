
autogenerated = 0

env = GTK_THEME,Arc-Darker
env = XCURSOR_THEME,Moyash-Pixel-Black
env = XCURSOR_SIZE,24

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher
$browser = firefox

exec-once = waybar
exec-once = hyprpaper
exec-once = kdeconnect-indicator
exec-once = wl-paste --watch cliphist store
exec-once = rm /home/testuser/.cache/cliphist/db
exec-once = sleep 1 && cliphist wipe

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 70% 60% && hyprctl dispatch centerwindow
bind = $mainMod, R, exec, $menu
bind = $mainMod, SPACE, exec, wofi --show drun --prompt "Search Apps"
bind = $mainMod, ESCAPE, exec, wlogout
bind =, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot der Region aufgenommen" -t 1 
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot des gesamten Bildschirms aufgenommen" -t 1 

# Lauter (erhöht um 5%)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

# Leiser (verringert um 5%)
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Stummschalten (Toggle)
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

mousebind = BTN_MIDDLE, exec, wl-paste --clipboard | wl-copy --primary

input {
    kb_layout=de
    kb_options=grp:caps_toggle
    numlock_by_default = true
}

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(cba6f7ff)
    col.inactive_border = rgba(585b70aa)

    layout = dwindle
}

decoration {
    rounding = 14

    active_opacity = 1.0
    inactive_opacity = 0.93
    blur {
        enabled = yes
        size = 8
        passes = 3
        new_optimizations = true
        xray = true
    }
    shadow {
        enabled = yes
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = yes

    bezier = smooth, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 7, smooth
    animation = windowsOut, 1, 7, default, popin 70%
    animation = fade, 1, 7, default
    animation = border, 1, 10, default
    animation = workspaces, 1, 6, default
}

misc {
    middle_click_paste = false
}

layerrule = blur on, match:namespace wlogout
layerrule = ignore_alpha 0.1, match:namespace wlogout
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.1, match:namespace logout_dialog
